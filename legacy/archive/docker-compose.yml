# RIO Governance Gateway — Docker Compose
# Self-hosted deployment: Gateway + PostgreSQL
#
# Usage:
#   cp .env.example .env    # Fill in your secrets
#   docker compose up -d    # Start all services
#   docker compose logs -f  # Watch logs
#
# The gateway will be available at http://localhost:4400
# PostgreSQL will be available at localhost:5432

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Append-only ledger and governance state
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rio_ledger
      POSTGRES_USER: rio
      POSTGRES_PASSWORD: ${PG_PASSWORD:-rio_gateway_2026}
    ports:
      - "${PG_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - rio-pgdata:/var/lib/postgresql/data
      - ./gateway/ledger/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rio -d rio_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # RIO Governance Gateway — Governed AI Execution Runtime
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: rio-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${RIO_GATEWAY_PORT:-4400}:4400"
    environment:
      NODE_ENV: production
      RIO_GATEWAY_PORT: 4400
      ED25519_MODE: optional # Set to 'required' for production

      # Database — connects to the postgres service
      DATABASE_URL: postgresql://rio:${PG_PASSWORD:-rio_gateway_2026}@postgres:5432/rio_ledger

      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RIO_LOGIN_PASSPHRASE: ${RIO_LOGIN_PASSPHRASE:-rio-governed-2026}
      TOKEN_EXPIRY_HOURS: ${TOKEN_EXPIRY_HOURS:-24}

      # Rate limiting
      RATE_LIMIT_GLOBAL: ${RATE_LIMIT_GLOBAL:-100}
      REQUEST_WINDOW_SECONDS: ${REQUEST_WINDOW_SECONDS:-60}
      NONCE_RETENTION_HOURS: ${NONCE_RETENTION_HOURS:-24}
      EXECUTION_TOKEN_EXPIRY_SECONDS: ${EXECUTION_TOKEN_EXPIRY_SECONDS:-300}
    volumes:
      - gateway-keys:/app/data/keys
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4400/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  rio-pgdata:
    driver: local
  gateway-keys:
    driver: local
