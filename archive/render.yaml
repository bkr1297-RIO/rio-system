# RIO Governance Gateway — Render Blueprint
# Deploy: Connect GitHub repo → Render auto-detects this file
#
# This creates:
#   1. A PostgreSQL database (rio-ledger)
#   2. A Node.js web service (rio-gateway)
#
# The gateway connects to PostgreSQL via DATABASE_URL (auto-injected by Render)

databases:
  - name: rio-ledger
    plan: free
    databaseName: rio_ledger
    user: rio
    ipAllowList: []

services:
  - type: web
    name: rio-gateway
    plan: free
    runtime: docker
    dockerfilePath: ./gateway/Dockerfile
    dockerContext: ./gateway
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RIO_GATEWAY_PORT
        value: "4400"
      - key: PORT
        value: "4400"
      - key: ED25519_MODE
        value: optional
      - key: JWT_SECRET
        generateValue: true
      - key: RIO_LOGIN_PASSPHRASE
        value: rio-governed-2026
      - key: DATABASE_URL
        fromDatabase:
          name: rio-ledger
          property: connectionString
      - key: GMAIL_USER
        sync: false  # Set manually in Render dashboard
      - key: GMAIL_APP_PASSWORD
        sync: false  # Set manually in Render dashboard
      # --- Twilio SMS Connector (identity-cleanup, 2026-04-11) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false  # Set manually in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: TWILIO_PHONE_NUMBER
        sync: false  # Set manually in Render dashboard
